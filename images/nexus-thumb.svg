<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 625" width="1000" height="625" role="img" aria-label="ThreatModeler NEXUS — AI-native security architect experience">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1628"/>
      <stop offset="0.55" stop-color="#171333"/>
      <stop offset="1" stop-color="#120f28"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.34" r="0.55">
      <stop offset="0" stop-color="#5E5CEB" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#5E5CEB" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#5E5CEB" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5E5CEB" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#8f8dff" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <rect width="1000" height="625" fill="url(#bg)"/>
  <rect width="1000" height="625" fill="url(#glow)"/>

  <!-- faint grid motif (echoes the case-study hero grid) -->
  <g stroke="#312d40" stroke-width="1" opacity="0.35">
    <path d="M0 78 H1000 M0 156 H1000 M0 234 H1000 M0 312 H1000 M0 390 H1000 M0 468 H1000 M0 546 H1000"/>
    <path d="M78 0 V625 M156 0 V625 M234 0 V625 M312 0 V625 M390 0 V625 M468 0 V625 M546 0 V625 M624 0 V625 M702 0 V625 M780 0 V625 M858 0 V625 M936 0 V625"/>
  </g>

  <!-- dashed trust boundary -->
  <rect x="360" y="150" width="470" height="300" rx="20" fill="none" stroke="#5E5CEB" stroke-opacity="0.5" stroke-width="2" stroke-dasharray="9 8"/>
  <text x="374" y="176" font-family="'Space Mono', monospace" font-size="15" letter-spacing="2" fill="#8f8dff" opacity="0.85">TRUST BOUNDARY</text>

  <!-- threat-model node graph -->
  <g stroke="url(#edge)" stroke-width="2.5" fill="none">
    <path d="M210 470 C 300 470, 320 300, 440 300"/>
    <path d="M440 300 C 560 300, 560 230, 640 230"/>
    <path d="M440 300 C 560 300, 560 380, 660 380"/>
    <path d="M640 230 C 730 230, 740 300, 780 300"/>
    <path d="M660 380 C 730 380, 740 300, 780 300"/>
  </g>

  <g font-family="'Space Grotesk', sans-serif">
    <!-- external / user node -->
    <circle cx="210" cy="470" r="26" fill="#1e1b2a" stroke="#a49fb5" stroke-width="2"/>
    <!-- process node -->
    <rect x="404" y="270" width="72" height="60" rx="12" fill="#211d44" stroke="#5E5CEB" stroke-width="2.5"/>
    <!-- data stores -->
    <rect x="612" y="204" width="56" height="52" rx="10" fill="#1e1b2a" stroke="#8f8dff" stroke-width="2"/>
    <rect x="632" y="356" width="56" height="52" rx="10" fill="#1e1b2a" stroke="#8f8dff" stroke-width="2"/>
    <!-- AI-generated node, highlighted -->
    <circle cx="806" cy="300" r="30" fill="#5E5CEB" filter="url(#soft)" opacity="0.9"/>
    <circle cx="806" cy="300" r="30" fill="#5E5CEB"/>
    <text x="806" y="306" text-anchor="middle" font-size="20" font-weight="700" fill="#fff">AI</text>
  </g>

  <!-- wordmark -->
  <g font-family="'Space Grotesk', sans-serif">
    <text x="78" y="120" font-size="46" font-weight="600" fill="#ffffff" letter-spacing="-1">ThreatModeler <tspan fill="#8f8dff">NEXUS</tspan></text>
    <text x="79" y="560" font-family="'Space Mono', monospace" font-size="17" letter-spacing="3" fill="#c7c3d6">AI-NATIVE SECURITY ARCHITECT EXPERIENCE</text>
  </g>
</svg>
