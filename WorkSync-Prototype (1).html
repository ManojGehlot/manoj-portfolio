<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WorkSync — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   WorkSync — Design System
   Extracted from the Adobe XD source; single source of truth
   for color, type, spacing and every repeatable component.
   ============================================================ */

/* ---------- Design tokens ---------- */
:root{
  /* Brand */
  --brand:#ED0988;          /* primary magenta */
  --brand-deep:#B82370;
  --brand-700:#8E1A5A;
  --brand-050:#FDE7F3;
  --pink-light:#EF91C1;

  /* Accents / status */
  --gold:#FDB515;
  --green:#29A251;
  --green-050:#E4F4EA;
  --red:#C63F42;
  --red-050:#FBE9E9;
  --amber-050:#FEF3D9;

  /* Ink / neutrals */
  --ink:#131318;            /* header / footer near-black */
  --ink-2:#2D2B43;          /* banner navy */
  --text:#1d1d24;
  --text-muted:#6b6b76;
  --text-faint:#9a9aa4;
  --line:#e7e7ec;
  --line-strong:#d7d7de;

  --gray-50:#F9F9F9;
  --gray-100:#F3F3F3;
  --gray-200:#E7E7EA;
  --gray-300:#dcdce1;
  --surface:#ffffff;
  --app-bg:#f4f5f7;

  /* Shape */
  --r-sm:6px;
  --r-md:10px;
  --r-lg:14px;
  --r-xl:20px;
  --r-pill:999px;

  /* Elevation */
  --shadow-sm:0 1px 2px rgba(20,20,30,.06),0 1px 3px rgba(20,20,30,.05);
  --shadow-md:0 4px 14px rgba(20,20,30,.08);
  --shadow-lg:0 18px 48px rgba(20,20,30,.18);
  --shadow-brand:0 8px 22px rgba(237,9,136,.28);

  /* Layout */
  --sidebar-w:96px;
  --header-h:60px;
  --footer-h:34px;

  --ease:cubic-bezier(.4,0,.2,1);
}

/* ---------- Reset ---------- */
*,*::before,*::after{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0;
  font-family:"Montserrat",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  color:var(--text);
  background:var(--app-bg);
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4,h5,p,figure{margin:0}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}
svg{width:18px;height:18px;flex-shrink:0}
img{max-width:100%;display:block}
:focus-visible{outline:2px solid var(--brand);outline-offset:2px}

/* ============================================================
   APP SHELL  (header / sidebar / footer injected by app.js)
   ============================================================ */
.app{min-height:100vh}

/* Header */
.ws-header{
  position:fixed;top:0;left:0;right:0;height:var(--header-h);z-index:60;
  background:var(--ink);color:#fff;
  display:flex;align-items:center;gap:24px;
  padding:0 26px 0 22px;
}
.ws-logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:17px;letter-spacing:.2px}
.ws-logo .mark{
  width:30px;height:30px;border-radius:8px;display:grid;place-items:center;
  background:linear-gradient(150deg,var(--brand),var(--brand-700));
  font-weight:800;color:#fff;font-size:16px;box-shadow:0 2px 8px rgba(237,9,136,.5)
}
.ws-header .spacer{flex:1}
.ws-header .icon-btn{
  width:38px;height:38px;border-radius:50%;border:0;background:transparent;color:#cfcfd6;
  display:grid;place-items:center;position:relative;transition:background .15s
}
.ws-header .icon-btn:hover{background:rgba(255,255,255,.09);color:#fff}
.ws-header .icon-btn .dot{position:absolute;top:8px;right:9px;width:7px;height:7px;border-radius:50%;background:var(--brand);border:2px solid var(--ink)}
.ws-user{display:flex;align-items:center;gap:11px;padding-left:20px;border-left:1px solid rgba(255,255,255,.14)}
.ws-user .avatar{
  width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:12px;color:#fff;
  background:linear-gradient(150deg,var(--brand),var(--brand-700))
}
.ws-user .who small{display:block;color:#b9b9c2;font-size:10.5px;line-height:1;margin-bottom:3px;font-weight:500}
.ws-user .who strong{font-size:12.5px;font-weight:700}

/* Sidebar */
.ws-side{
  position:fixed;top:var(--header-h);bottom:0;left:0;width:var(--sidebar-w);z-index:55;
  background:var(--surface);border-right:1px solid var(--line);
  display:flex;flex-direction:column;padding:16px 0;gap:2px;overflow:visible
}
.nav-item{position:relative}
.nav-item>.nav-link{
  width:70px;margin:0 auto;padding:12px 4px;border-radius:var(--r-md);
  display:flex;flex-direction:column;align-items:center;gap:7px;
  color:var(--text-muted);font-size:10.5px;font-weight:600;text-align:center;line-height:1.2;
  transition:background .15s,color .15s;cursor:pointer;border:0;background:transparent
}
.nav-item>.nav-link svg{width:22px;height:22px}
.nav-item>.nav-link:hover{background:var(--gray-100);color:var(--text)}
.nav-item.active>.nav-link{
  background:linear-gradient(160deg,var(--brand),var(--brand-700));
  color:#fff;box-shadow:var(--shadow-brand)
}
/* Flyout submenu */
.nav-flyout{
  position:absolute;left:calc(100% - 6px);top:0;min-width:210px;
  background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);
  box-shadow:var(--shadow-lg);padding:8px;opacity:0;visibility:hidden;transform:translateX(6px);
  transition:.16s var(--ease);z-index:70
}
.nav-item:hover .nav-flyout{opacity:1;visibility:visible;transform:translateX(0)}
.nav-flyout .fly-head{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--text-faint);padding:6px 10px 4px;font-weight:700}
.nav-flyout a{
  display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:var(--r-sm);
  font-size:12.5px;font-weight:600;color:var(--text);transition:background .12s
}
.nav-flyout a:hover{background:var(--brand-050);color:var(--brand-deep)}
.nav-flyout a.current{color:var(--brand-deep)}
.nav-flyout a .di{width:15px;color:var(--text-faint)}
.nav-flyout a:hover .di{color:var(--brand)}

/* Footer */
.ws-footer{
  position:fixed;left:0;right:0;bottom:0;height:var(--footer-h);z-index:40;
  background:var(--ink);color:#8a8a95;font-size:11px;
  display:flex;align-items:center;justify-content:center;letter-spacing:.3px
}

/* Main content region */
.ws-main{
  padding:calc(var(--header-h) + 22px) 30px calc(var(--footer-h) + 26px) calc(var(--sidebar-w) + 30px);
  min-height:100vh;max-width:1680px
}

/* Page head / breadcrumb */
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:20px}
.page-head h1{font-size:22px;font-weight:700;letter-spacing:-.2px}
.crumb{font-size:12px;color:var(--text-faint);margin-top:4px;font-weight:500;text-transform:capitalize}
.crumb b{color:var(--text-muted)}

/* ============================================================
   COMPONENTS
   ============================================================ */

/* Buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  height:40px;padding:0 18px;border-radius:var(--r-md);border:1px solid transparent;
  font-size:13px;font-weight:600;letter-spacing:.1px;transition:.15s var(--ease);white-space:nowrap;background:none
}
.btn svg{width:16px;height:16px}
.btn-primary{background:linear-gradient(160deg,var(--brand),var(--brand-deep));color:#fff;box-shadow:var(--shadow-brand)}
.btn-primary:hover{filter:brightness(1.05);transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}
.btn-ghost{background:var(--surface);border-color:var(--line-strong);color:var(--text)}
.btn-ghost:hover{border-color:var(--brand);color:var(--brand-deep);background:var(--brand-050)}
.btn-subtle{background:var(--gray-100);color:var(--text)}
.btn-subtle:hover{background:var(--gray-200)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{filter:brightness(1.05)}
.btn-sm{height:32px;padding:0 13px;font-size:12px;border-radius:var(--r-sm)}
.btn-lg{height:46px;padding:0 26px;font-size:14px}
.btn[disabled]{opacity:.5;pointer-events:none}
.btn-link{background:none;border:0;color:var(--brand-deep);font-weight:600;padding:0;height:auto}
.btn-link:hover{text-decoration:underline}

/* Cards */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow-sm)}
.card-pad{padding:22px}

/* Badges / status pills */
.badge{display:inline-flex;align-items:center;gap:6px;height:24px;padding:0 11px;border-radius:var(--r-pill);font-size:11px;font-weight:700;letter-spacing:.2px}
.badge .bdot{width:6px;height:6px;border-radius:50%;background:currentColor}
.badge-green{background:var(--green-050);color:#1f7d45}
.badge-amber{background:var(--amber-050);color:#9a6a06}
.badge-red{background:var(--red-050);color:#a53236}
.badge-gray{background:var(--gray-100);color:var(--text-muted)}
.badge-pink{background:var(--brand-050);color:var(--brand-deep)}

/* Inputs & forms */
.field{display:flex;flex-direction:column;gap:7px}
.field>label{font-size:12px;font-weight:600;color:var(--text-muted)}
.field>label .req{color:var(--brand)}
.input,.select,.textarea{
  width:100%;height:42px;padding:0 13px;border:1px solid var(--line-strong);border-radius:var(--r-md);
  background:var(--surface);font:inherit;font-size:13px;color:var(--text);transition:.15s
}
.textarea{height:auto;min-height:88px;padding:11px 13px;resize:vertical}
.input::placeholder,.textarea::placeholder{color:var(--text-faint)}
.input:focus,.select:focus,.textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(237,9,136,.12)}
.select{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%236b6b76' stroke-width='2.4'><path d='M6 9l6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 12px center;padding-right:34px}
.input-icon{position:relative}
.input-icon svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text-faint)}
.input-icon .input{padding-left:38px}
.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px 24px}
.form-grid .col-2{grid-column:span 2}
.form-grid .col-3{grid-column:span 3}

/* Toggle chips (yes/no, radio-ish) */
.chip-group{display:inline-flex;gap:8px}
.chip{height:34px;padding:0 16px;border-radius:var(--r-pill);border:1px solid var(--line-strong);background:var(--surface);font-size:12.5px;font-weight:600;color:var(--text-muted);transition:.15s}
.chip.on,.chip:hover{border-color:var(--brand);color:var(--brand-deep);background:var(--brand-050)}
.chip.on{background:var(--brand);color:#fff;border-color:var(--brand)}

/* Tabs / segmented */
.segmented{display:inline-flex;background:var(--gray-100);border-radius:var(--r-md);padding:3px}
.segmented button{border:0;background:transparent;height:32px;padding:0 14px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--text-muted)}
.segmented button.on{background:var(--surface);color:var(--brand-deep);box-shadow:var(--shadow-sm)}

.viewtoggle{display:inline-flex;gap:4px}
.viewtoggle button{width:38px;height:38px;border-radius:8px;border:1px solid var(--line);background:var(--surface);display:grid;place-items:center;color:var(--text-muted)}
.viewtoggle button.on{background:var(--brand-050);border-color:var(--brand);color:var(--brand-deep)}

/* Tables */
.table-wrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-sm)}
table.data{width:100%;border-collapse:collapse;font-size:12.5px}
table.data thead th{
  text-align:left;padding:14px 16px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;
  color:var(--text-muted);background:var(--gray-50);border-bottom:1px solid var(--line);font-weight:700;white-space:nowrap
}
table.data tbody td{padding:14px 16px;border-bottom:1px solid var(--line);vertical-align:middle}
table.data tbody tr:last-child td{border-bottom:0}
table.data tbody tr{transition:background .12s}
table.data tbody tr:hover{background:var(--gray-50)}
table.data .strong{font-weight:700;color:var(--text)}
table.data .muted{color:var(--text-faint)}
.tbl-toolbar{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px;border-bottom:1px solid var(--line)}
.pagination{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;font-size:12px;color:var(--text-muted)}
.pagination .pages{display:flex;gap:6px}
.pagination .pages button{width:32px;height:32px;border-radius:8px;border:1px solid var(--line);background:var(--surface);font-size:12px;font-weight:600;color:var(--text-muted)}
.pagination .pages button.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.pagination .pages button:disabled{opacity:.4}

/* avatar cluster */
.avatar-xs{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-size:10px;font-weight:700;color:#fff;background:var(--brand-deep)}

/* Stat banner (project management hero) */
.hero-banner{
  border-radius:var(--r-xl);padding:26px 30px;color:#fff;position:relative;overflow:hidden;
  background:linear-gradient(100deg,var(--ink-2) 0%,#3a2547 42%,var(--brand-700) 100%);
  display:flex;align-items:center;gap:30px
}
.hero-banner::after{content:"";position:absolute;right:-40px;top:-60px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(237,9,136,.5),transparent 68%)}
.hero-banner h2{font-size:24px;font-weight:700;flex:1;position:relative;z-index:1}
.hero-stats{display:flex;gap:34px;position:relative;z-index:1}
.hero-stats .stat b{display:block;font-size:26px;font-weight:800;line-height:1}
.hero-stats .stat span{font-size:11.5px;color:rgba(255,255,255,.8);font-weight:500}
.hero-banner .btn-primary{position:relative;z-index:1;background:#fff;color:var(--brand-deep);box-shadow:0 6px 18px rgba(0,0,0,.25)}
.hero-banner .btn-primary:hover{background:#fff;filter:none}

/* Project card (grid view) */
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:18px}
.proj-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:18px;box-shadow:var(--shadow-sm);position:relative;transition:.15s}
.proj-card:hover{box-shadow:var(--shadow-md);border-color:var(--line-strong);transform:translateY(-2px)}
.proj-card.inactive{background:var(--gray-50)}
.proj-card .pc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:14px}
.proj-card .pc-name{font-size:15px;font-weight:700}
.proj-card .pc-code{font-size:11.5px;color:var(--text-faint);font-weight:600;margin-top:2px}
.proj-meta{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px}
.proj-meta .m label{display:block;font-size:10.5px;color:var(--text-faint);font-weight:600;margin-bottom:2px;text-transform:uppercase;letter-spacing:.3px}
.proj-meta .m span{font-size:12.5px;font-weight:600}
.kebab{width:32px;height:32px;border-radius:8px;border:1px solid var(--line);background:var(--surface);display:grid;place-items:center;color:var(--text-muted);flex-shrink:0}
.kebab:hover{background:var(--gray-100);color:var(--text)}

/* Context menu */
.ctx-menu{
  position:absolute;min-width:200px;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--r-md);box-shadow:var(--shadow-lg);padding:6px;z-index:80;
}
.ctx-menu button{
  width:100%;display:flex;align-items:center;gap:10px;padding:9px 11px;border:0;background:none;
  border-radius:var(--r-sm);font-size:12.5px;font-weight:600;color:var(--text);text-align:left;transition:background .12s
}
.ctx-menu button:hover{background:var(--brand-050);color:var(--brand-deep)}
.ctx-menu button svg{width:15px;height:15px;color:var(--text-faint)}
.ctx-menu button:hover svg{color:var(--brand)}
.ctx-menu .sep{height:1px;background:var(--line);margin:5px 0}
.ctx-menu button.danger{color:var(--red)}
.ctx-menu button.danger svg{color:var(--red)}

/* Modal / dialog */
.overlay{position:fixed;inset:0;background:rgba(15,14,22,.62);backdrop-filter:blur(2px);z-index:100;display:grid;place-items:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.show{opacity:1;pointer-events:auto}
.modal{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);width:min(460px,100%);padding:30px 28px;text-align:center;transform:translateY(10px) scale(.98);transition:.22s var(--ease)}
.overlay.show .modal{transform:none}
.modal.wide{width:min(620px,100%);text-align:left}
.modal .m-icon{width:66px;height:66px;border-radius:50%;display:grid;place-items:center;margin:2px auto 16px}
.modal .m-icon.ok{background:var(--green-050);color:var(--green)}
.modal .m-icon.warn{background:var(--red-050);color:var(--red)}
.modal .m-icon svg{width:34px;height:34px}
.modal h3{font-size:18px;font-weight:700;margin-bottom:8px}
.modal p{color:var(--text-muted);font-size:13px;margin-bottom:22px}
.modal .m-actions{display:flex;gap:12px;justify-content:center}
.modal.wide .m-actions{justify-content:flex-end}
.modal .m-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border:0;background:none;color:var(--text-faint);border-radius:8px}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-head h3{font-size:16px}

/* Toast */
.toast-host{position:fixed;bottom:52px;right:24px;z-index:200;display:flex;flex-direction:column;gap:10px}
.toast{display:flex;align-items:center;gap:11px;background:var(--ink);color:#fff;padding:13px 17px;border-radius:var(--r-md);box-shadow:var(--shadow-lg);font-size:13px;font-weight:600;transform:translateX(20px);opacity:0;transition:.25s var(--ease)}
.toast.show{transform:none;opacity:1}
.toast .ti{width:20px;height:20px;color:var(--green)}
.toast.warn .ti{color:var(--gold)}

/* Wizard stepper */
.stepper{display:flex;align-items:center;gap:0;margin-bottom:26px}
.stepper .step{display:flex;align-items:center;gap:11px;color:var(--text-faint)}
.stepper .step .num{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-size:12.5px;font-weight:700;background:var(--gray-100);color:var(--text-muted);border:2px solid transparent}
.stepper .step .lbl{font-size:13px;font-weight:600}
.stepper .step.active .num{background:var(--brand);color:#fff}
.stepper .step.active .lbl{color:var(--text)}
.stepper .step.done .num{background:var(--green);color:#fff}
.stepper .step.done .lbl{color:var(--text)}
.stepper .bar{flex:1;height:2px;background:var(--line);margin:0 16px;border-radius:2px}
.stepper .bar.filled{background:var(--green)}

/* Project summary strip (used in tagging flows) */
.proj-summary{display:flex;flex-wrap:wrap;gap:26px;padding:18px 22px;background:var(--gray-50);border:1px solid var(--line);border-radius:var(--r-md)}
.proj-summary .ps{min-width:120px}
.proj-summary .ps label{display:block;font-size:10.5px;color:var(--text-faint);font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px}
.proj-summary .ps span{font-size:13px;font-weight:700}

/* Legend (roster) */
.legend{display:flex;flex-wrap:wrap;gap:16px;align-items:center;font-size:11.5px;color:var(--text-muted);font-weight:600}
.legend .lg{display:flex;align-items:center;gap:7px}
.legend .sw{width:14px;height:14px;border-radius:4px}

/* Roster grid */
.roster{width:100%;border-collapse:separate;border-spacing:0;font-size:12px}
.roster th,.roster td{border-bottom:1px solid var(--line);border-right:1px solid var(--line)}
.roster thead th{background:var(--gray-50);padding:10px 8px;font-size:11px;color:var(--text-muted);font-weight:700;position:sticky;top:0}
.roster .emp{padding:10px 12px;min-width:210px;text-align:left;position:sticky;left:0;background:var(--surface);z-index:2}
.roster .emp .eid{font-size:10.5px;color:var(--text-faint);font-weight:600}
.roster .emp .enm{font-weight:700;font-size:12.5px}
.roster .emp .eproj{font-size:10.5px;color:var(--brand-deep);font-weight:600;margin-top:2px}
.roster td.cell{padding:6px;text-align:center;min-width:118px}
.shift-chip{border-radius:6px;padding:6px 4px;font-size:10.5px;font-weight:700;line-height:1.2;color:#fff}
.shift-gs{background:#6b7280}
.shift-morning{background:#38a169}
.shift-afternoon{background:#3b82c4}
.shift-night{background:#7c5cbf}
.shift-wo{background:#e5e7eb;color:#6b7280}
.shift-h{background:#fdb515;color:#5b4400}
.shift-l{background:#f0a4c4;color:#7a1450}
.shift-empty{background:var(--gray-50);color:var(--text-faint)}

/* Allowance matrix */

/* ---------- Modals / toast / menu ---------- */
let overlayEl, closeTimer;
function ensureOverlay(){if(!overlayEl){overlayEl=document.createElement('div');overlayEl.className='overlay';overlayEl.addEventListener('click',e=>{if(e.target===overlayEl)closeModal();});document.body.appendChild(overlayEl);}return overlayEl;}
function openModal(html){clearTimeout(closeTimer);const o=ensureOverlay();o.innerHTML=html;requestAnimationFrame(()=>o.classList.add('show'));}
function closeModal(){if(overlayEl){clearTimeout(closeTimer);overlayEl.classList.remove('show');closeTimer=setTimeout(()=>{overlayEl.innerHTML='';},200);}}
function success(title,msg,{cta='Done',onClose}={}){
  openModal(`<div class="modal"><button class="m-close" onclick="WS.closeModal()">${icon('x')}</button>
    <div class="m-icon ok">${icon('check')}</div><h3>${title}</h3><p>${msg||''}</p>
    <div class="m-actions"><button class="btn btn-primary" id="wsOkBtn">${cta}</button></div></div>`);
  document.getElementById('wsOkBtn').onclick=()=>{closeModal();onClose&&onClose();};
}
function confirmDialog({title,msg,confirmText='Confirm',danger=false,onConfirm}={}){
  openModal(`<div class="modal"><button class="m-close" onclick="WS.closeModal()">${icon('x')}</button>
    <div class="m-icon warn">${icon('alert')}</div><h3>${title}</h3><p>${msg||''}</p>
    <div class="m-actions"><button class="btn btn-ghost" onclick="WS.closeModal()">Cancel</button>
    <button class="btn ${danger?'btn-danger':'btn-primary'}" id="wsCf">${confirmText}</button></div></div>`);
  document.getElementById('wsCf').onclick=()=>{closeModal();onConfirm&&onConfirm();};
}
function toast(msg,kind='ok'){
  let host=document.querySelector('.toast-host');
  if(!host){host=document.createElement('div');host.className='toast-host';document.body.appendChild(host);}
  const t=document.createElement('div');t.className='toast'+(kind==='warn'?' warn':'');
  t.innerHTML=`${icon(kind==='warn'?'alert':'check','ti')}<span>${msg}</span>`;
  host.appendChild(t);requestAnimationFrame(()=>t.classList.add('show'));
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300);},2800);
}
function contextMenu(anchor,items){
  document.querySelectorAll('.ctx-menu').forEach(m=>m.remove());
  const menu=document.createElement('div');menu.className='ctx-menu';
  menu.innerHTML=items.map(it=>it==='-'?'<div class="sep"></div>':`<button class="${it.danger?'danger':''}">${icon(it.icon)||''}${it.label}</button>`).join('');
  document.body.appendChild(menu);
  const r=anchor.getBoundingClientRect();
  menu.style.top=(r.bottom+6+window.scrollY)+'px';
  let left=r.right-200+window.scrollX;if(left<8)left=8;menu.style.left=left+'px';
  Array.from(menu.querySelectorAll('button')).forEach((b,i)=>{const it=items.filter(x=>x!=='-')[i];b.onclick=()=>{menu.remove();it.onClick&&it.onClick();};});
  const close=e=>{if(!menu.contains(e.target)){menu.remove();document.removeEventListener('click',close);}};
  setTimeout(()=>document.addEventListener('click',close),0);
}

/* ---------- Router ---------- */
const views={};
function go(hash){ if(location.hash===hash) route(); else location.hash=hash; }
function parseHash(){
  let h=location.hash.replace(/^#\/?/,'');
  if(!h)h='home';
  const [path,qs]=h.split('?');
  const params={};(qs||'').split('&').forEach(kv=>{if(kv){const[k,v]=kv.split('=');params[k]=decodeURIComponent(v||'');}});
  return {path,params};
}
function route(){
  document.querySelectorAll('.pop-menu,.ctx-menu').forEach(m=>m.remove());
  if(overlayEl){overlayEl.classList.remove('show');overlayEl.innerHTML='';}
  const {path,params}=parseHash();
  const v=views[path]||views.home;
  const def=v(params);
  document.getElementById('app').innerHTML=shell(def.active,def.title,def.crumb,def.html);
  window.scrollTo(0,0);
  if(def.setup)def.setup(params);
  closeModal();
}

const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
const qs=(s,r=document)=>r.querySelector(s);
const qsa=(s,r=document)=>[...r.querySelectorAll(s)];

function start(){
  window.addEventListener('hashchange',route);
  route();
}

return {icon,NAV,ROLES,setRole,roleMenu,notifs,getRole:()=>role,go,route,start,views,shell,headActions,openModal,closeModal,success,confirm:confirmDialog,toast,contextMenu,el,qs,qsa};
})();

      c.querySelectorAll('.kebab').forEach(b=>b.onclick=e=>{e.stopPropagation();WS.contextMenu(b,menuFor(list[+b.dataset.i]));});
    }
    render();
    WS.qs('#vGrid').onclick=()=>{view='grid';WS.qs('#vGrid').classList.add('on');WS.qs('#vList').classList.remove('on');render();};
    WS.qs('#vList').onclick=()=>{view='list';WS.qs('#vList').classList.add('on');WS.qs('#vGrid').classList.remove('on');render();};
    WS.qs('#search').oninput=e=>{term=e.target.value;render();};
    const fb=WS.qs('#filterBtn'),fp=WS.qs('#filterPop');
    fb.onclick=()=>fp.classList.toggle('hidden');
    document.addEventListener('click',e=>{if(!fp.contains(e.target)&&e.target!==fb)fp.classList.add('hidden');});
    fp.querySelectorAll('input').forEach(inp=>inp.onchange=()=>{if(inp.value==='all'&&inp.checked){fp.querySelectorAll('input').forEach(x=>{if(x.value!=='all')x.checked=false;});}else if(inp.value!=='all'&&inp.checked){fp.querySelector('input[value=all]').checked=false;}});
    WS.qs('#fReset').onclick=()=>{fp.querySelectorAll('input').forEach(x=>x.checked=x.value==='all');};
    WS.qs('#fDone').onclick=()=>{filters=[...fp.querySelectorAll('input:checked')].map(x=>x.value);if(!filters.length)filters=['all'];fp.classList.add('hidden');render();};
  }
});

WS.views['tag-employees']=(params)=>{

      if(step===0){next.textContent='Next';
        body.innerHTML=`<div class="row mb-16" style="gap:12px"><div class="input-icon grow">${WS.icon('search')}<input class="input" placeholder="Search project / PRCODE" id="projSearch"></div><select class="select" style="width:180px"><option>All Projects</option></select></div><div class="pick-list" id="projList"></div>`;

      }
      if(step===1){next.textContent='Next';

        let f='all';
        const draw=(t='')=>{WS.qs('#empList').innerHTML=DATA.employees.filter(e=>f==='all'||e.status===f).filter(e=>(e.name+e.id).toLowerCase().includes(t.toLowerCase())).map(e=>`<div class="pick ${selected.has(e.id)?'sel':''}" data-id="${e.id}"><div class="cbx">${WS.icon('check')}</div><div class="grow"><div class="nm">${e.name}</div><div class="sub">${e.id} · ${e.role}</div></div><span class="badge badge-${e.status==='tagged'?'green':e.status==='pending'?'amber':'gray'}">${e.status}</span></div>`).join('');WS.qsa('#empList .pick').forEach(elx=>elx.onclick=()=>{const id=elx.dataset.id;selected.has(id)?selected.delete(id):selected.add(id);draw(WS.qs('#empSearch').value);});};
        draw();WS.qs('#empSearch').oninput=e=>draw(e.target.value);
        WS.qsa('.segmented button').forEach(b=>b.onclick=()=>{WS.qsa('.segmented button').forEach(x=>x.classList.remove('on'));b.classList.add('on');f=b.dataset.f;draw(WS.qs('#empSearch').value);});
      }
      if(step===2){next.textContent='Confirm & Submit';
        const chosen=DATA.employees.filter(e=>selected.has(e.id));

        <div class="sec-title">Selected employees (${chosen.length})</div>
        ${chosen.length?`<div class="table-wrap"><table class="data"><thead><tr><th>ID</th><th>Name</th><th>Role</th><th>Start Date</th><th>End Date</th></tr></thead><tbody>${chosen.map(e=>`<tr><td class="strong">${e.id}</td><td>${e.name}</td><td class="muted">${e.role}</td><td>08/08/2023</td><td>08/08/2024</td></tr>`).join('')}</tbody></table></div>`:`<div class="empty-state"><div class="ei">${WS.icon('users')}</div><h3>No employees selected</h3><p>Go back to step 2 to select employees.</p></div>`}`;
      }
    }
    WS.qs('#nextBtn').onclick=()=>{if(step===1&&selected.size===0){WS.toast('Select at least one employee','warn');return;}if(step<2){step++;render();return;}WS.success('Employee Tagged Successfully',`${selected.size} employee(s) have been tagged to "${selectedProject}" for the selected duration.`,{cta:'Back to Projects',onClose:()=>WS.go('#/projects')});};
    WS.qs('#prevBtn').onclick=()=>{if(step>0){step--;render();}};
    render();
  }};
};

WS.views['project-requests']=()=>({active:'projects',title:'Project Requests',crumb:['Project Management','Project Requests'],

      <div class="m-actions" style="margin-top:22px">${pending?`<button class="btn btn-danger" id="rej">Reject</button><button class="btn btn-primary" id="reqApprove">Approve</button>`:`<button class="btn btn-ghost" onclick="WS.closeModal()">Close</button>`}</div></div>`);

    }
    WS.qsa('#tabs button').forEach(b=>b.onclick=()=>{WS.qsa('#tabs button').forEach(x=>x.classList.remove('on'));b.classList.add('on');tab=b.dataset.t;render();});
    WS.qs('#search').oninput=e=>{term=e.target.value;render();};
    render();
  }
});

    function render(){const rows=list();WS.qs('#rows').innerHTML=rows.length?rows.map(t=>`<tr><td class="strong">${t.id}</td><td>${t.subject}</td><td class="muted">${t.cat}</td><td><span class="prio"><span class="pd" style="background:${prio(t.prio)}"></span>${t.prio}</span></td><td class="muted">${t.date}</td><td><span class="badge ${t.status==='open'?'badge-amber':'badge-green'}"><span class="bdot"></span>${t.status==='open'?'Open':'Resolved'}</span></td></tr>`).join(''):`<tr><td colspan="6"><div class="empty-state"><div class="ei">${WS.icon('tickets')}</div><h3>No tickets here</h3></div></td></tr>`;}
    render();
    WS.qsa('#tabs button').forEach(b=>b.onclick=()=>{WS.qsa('#tabs button').forEach(x=>x.classList.remove('on'));b.classList.add('on');tab=b.dataset.t;render();});
    WS.qs('#search').oninput=e=>{term=e.target.value;render();};
    WS.qs('#raise').onclick=()=>{WS.openModal(`<div class="modal wide"><button class="m-close" onclick="WS.closeModal()">${WS.icon('x')}</button><div class="modal-head"><h3>Raise a Ticket</h3></div><div class="form-grid"><div class="field col-2"><label>Subject <span class="req">*</span></label><input class="input" placeholder="Briefly describe the issue"></div><div class="field"><label>Category</label><select class="select"><option>Roster</option><option>Allowance</option><option>Tagging</option><option>Reports</option><option>Projects</option></select></div><div class="field"><label>Priority</label><select class="select"><option>Low</option><option>Medium</option><option>High</option></select></div><div class="field col-2"><label>Related Project (optional)</label><select class="select"><option>—</option>${DATA.projects.map(p=>`<option>${p.name}</option>`).join('')}</select></div><div class="field col-3"><label>Description</label><textarea class="textarea" placeholder="Describe what happened and the steps to reproduce"></textarea></div></div><div class="m-actions" style="margin-top:22px"><button class="btn btn-ghost" onclick="WS.closeModal()">Cancel</button><button class="btn btn-primary" id="tkSubmit">Submit Ticket</button></div></div>`);WS.qs('#tkSubmit').onclick=()=>{WS.closeModal();WS.success('Ticket Raised','Your ticket has been created and assigned ID "TKT-004822". Our team will respond shortly.');};};
  }
});
